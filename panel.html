<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ODH Event Tracker</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1>ODH Event Tracker</h1>
        <span class="event-count">0 events</span>
      </div>
      <div class="header-right">
        <button id="clearBtn" class="btn btn-clear">Clear</button>
        <button id="exportBtn" class="btn btn-export">Export JSON</button>
      </div>
    </div>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="Filter events by name..." class="search-input">
      <label class="toggle-label">
        <input type="checkbox" id="autoScrollToggle" checked>
        Auto-scroll
      </label>
    </div>

    <div class="events-container" id="eventsContainer">
      <div class="empty-state">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path>
        </svg>
        <p>No events captured yet</p>
        <small>Tracking events will appear here when fired</small>
      </div>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
